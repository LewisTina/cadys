name: DevSecOps CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  security-scans:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # PARTIE 2: Pour le Linting des fichiers YAML
      - name: YAML Lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: "."

      # PARTIE 3: Pour le Scan des dépendances (SCA) 
      - name: Run Trivy FS scan (Dependencies)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      # PARTIE 2: Pour le Build de l'image Docker
      - name: Build Docker image
        run: docker build -t nextjs-app:${{ github.sha }} .

      # PARTIE 3: Pour le Scan de l'image Docker
      - name: Run Trivy Image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'nextjs-app:${{ github.sha }}'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'